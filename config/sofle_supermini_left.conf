# Left half only: OLED display. Right half has no OLED; keeping display config
# here prevents the right half from enabling I2C/SSD1306 and hanging on boot
# when it probes 0x3c and gets no response from a non-existent device.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
