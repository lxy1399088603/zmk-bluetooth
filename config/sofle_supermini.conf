# First-pass wireless build for a Pro Micro-footprint SuperMini NRF52840 Sofle.
CONFIG_ZMK_KEYBOARD_NAME="lxy-kb"

# Basic power behavior for wireless use.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Encoder support. The encoders are modeled as ZMK sensors, not fake VIA keys.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Minimal OLED bring-up. Keep this conservative so display init does not block keyboard input.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
