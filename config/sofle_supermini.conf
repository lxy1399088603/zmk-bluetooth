# First-pass wireless build for a Pro Micro-footprint SuperMini NRF52840 Sofle.
CONFIG_ZMK_KEYBOARD_NAME="Sofle SuperMini"

# Keep BLE and USB both available; use &out in the keymap to choose output.
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Basic power behavior for wireless use. RGB/OLED stay disabled in v1.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Encoder support. The encoders are modeled as ZMK sensors, not fake VIA keys.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Leave display and RGB disabled until the matrix, BLE split, and encoders are proven.
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_BACKLIGHT=n
