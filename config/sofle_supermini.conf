# First-pass wireless build for a Pro Micro-footprint SuperMini NRF52840 Sofle.
CONFIG_ZMK_KEYBOARD_NAME="lxy-kb"

# Basic power behavior for wireless use.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Encoder support. The encoders are modeled as ZMK sensors, not fake VIA keys.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# BLE stability fixes.
# Delay NVS flash writes by 60s so an unclean power-off during connection events
# does not corrupt the bond/settings table (the primary cause of BT becoming
# unusable after power cycling until flash is fully erased).
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=60000
# Experimental BLE connection handling: improves split reconnection speed and
# reduces the chance of the central failing to re-acquire the peripheral.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# +8 dBm TX power improves link reliability between the two halves.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
